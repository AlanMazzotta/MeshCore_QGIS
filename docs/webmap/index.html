<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portland MeshCore Network: Terrain-Aware Coverage Analysis</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    #header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: rgba(15, 15, 30, 0.88);
      padding: 10px 16px;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
    }

    #header-text h1 {
      font-size: 15px;
      font-weight: bold;
      color: #ffffff;
      letter-spacing: 0.02em;
    }

    #header-text p {
      font-size: 11px;
      color: #aaa;
      margin-top: 2px;
    }

    #bookmarks {
      display: flex;
      gap: 6px;
    }

    .bookmark-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid #555;
      border-radius: 3px;
      color: #ddd;
      font-size: 11px;
      padding: 3px 10px;
      cursor: pointer;
      white-space: nowrap;
    }

    .bookmark-btn:hover {
      background: rgba(255,255,255,0.16);
      border-color: #888;
    }

    #map {
      position: absolute;
      top: 52px; bottom: 0; left: 0; right: 0;
    }

    /* Legend */
    .legend {
      background: rgba(15, 15, 30, 0.88);
      border: 1px solid #444;
      border-radius: 4px;
      padding: 10px 12px;
      font-size: 11px;
      line-height: 1.6;
      min-width: 160px;
    }

    .legend h4 {
      font-size: 11px;
      font-weight: bold;
      color: #ccc;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 3px;
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .legend-swatch.circle {
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4);
    }

    .legend-swatch.gradient {
      background: linear-gradient(to right, #140b34, #841f6b, #e55c30, #fbbb30, #fcffa4);
      border-radius: 2px;
      width: 60px;
      height: 10px;
    }

    .legend-divider {
      border: none;
      border-top: 1px solid #444;
      margin: 7px 0;
    }

    /* Layer control override for dark theme */
    .leaflet-control-layers {
      background: rgba(15, 15, 30, 0.88) !important;
      border: 1px solid #444 !important;
      color: #ddd !important;
    }

    .leaflet-control-layers label {
      color: #ddd !important;
    }

    .leaflet-control-layers-separator {
      border-color: #444 !important;
    }

    /* Kebab toggle for layer control */
    .leaflet-control-layers-toggle {
      background-image: none !important;
      width: auto !important;
      height: 30px !important;
      display: flex !important;
      align-items: center;
      justify-content: center;
      padding: 0 10px !important;
      gap: 6px;
    }
    .leaflet-control-layers-toggle::before {
      content: 'Layers';
      font-size: 11px;
      color: #ddd;
    }
    .leaflet-control-layers-toggle::after {
      content: '⋮';
      font-size: 18px;
      color: #ddd;
      line-height: 1;
    }

    /* Legend toggle button */
    .legend-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }
    .legend-toggle {
      background: none;
      border: none;
      color: #ddd;
      font-size: 18px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
    }

    /* Base layer panes — blend modes applied at pane level */
    .leaflet-hillshade-pane { mix-blend-mode: screen; }
    .leaflet-dem-pane       { mix-blend-mode: screen; }

    /* Popup styling */
    .leaflet-popup-content-wrapper {
      background: rgba(15, 15, 30, 0.95);
      border: 1px solid #555;
      border-radius: 4px;
      color: #e0e0e0;
    }

    .leaflet-popup-tip {
      background: rgba(15, 15, 30, 0.95);
    }

    .leaflet-popup-content {
      margin: 10px 14px;
      font-size: 12px;
      line-height: 1.7;
    }

    .popup-name {
      font-size: 13px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 4px;
    }

    .popup-class {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: bold;
      margin-bottom: 6px;
      color: #fff;
    }

    .popup-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
    }

    .popup-label { color: #999; }
    .popup-value { color: #fff; font-weight: bold; }

    .leaflet-control-zoom a,
    .leaflet-control-attribution {
      background: rgba(15, 15, 30, 0.88) !important;
      color: #aaa !important;
    }

    .leaflet-control-attribution a { color: #888 !important; }
  </style>
</head>
<body>

<div id="header">
  <div id="header-text">
    <h1>Portland MeshCore Network: Terrain-Aware Coverage Analysis</h1>
    <p>Geometric line-of-sight viewshed per repeater node &mdash; Copernicus GLO-30 DEM, 30 m resolution &mdash; <a href="https://github.com/alanmazzotta/MeshCore_QGIS" style="color:#888">Plugin source</a></p>
  </div>
  <div id="bookmarks">
    <button class="bookmark-btn" onclick="zoomOverview()">Overview</button>
    <button class="bookmark-btn" onclick="zoomObserver()">Approximate Observer location</button>
  </div>
</div>

<div id="map"></div>

<script>
// ---------------------------------------------------------------------------
// Map init
// ---------------------------------------------------------------------------
const map = L.map('map', {
  center: [45.52, -122.68],
  zoom: 11,
  zoomControl: true,
});

// ---------------------------------------------------------------------------
// Bookmarks
// ---------------------------------------------------------------------------
function zoomOverview() {
  map.fitBounds([[44.92, -123.92], [46.03, -121.60]]);
}

function zoomObserver() {
  map.fitBounds([[45.463268, -122.809455], [45.513131, -122.692517]]);
}

// ---------------------------------------------------------------------------
// Basemap
// ---------------------------------------------------------------------------
L.tileLayer('https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19,
}).addTo(map);

// ---------------------------------------------------------------------------
// Base enhancements — DEM extent highlight, DEM grayscale, hillshade
// ---------------------------------------------------------------------------
const baseBounds = [[44.9201, -123.9176], [46.0257, -121.5957]];

// Custom panes for base layers — z-index 250/260 = above tiles (200), below overlays (400)
map.createPane('hillshadePane');
map.createPane('demPane');
map.getPane('demPane').style.zIndex = 250;
map.getPane('hillshadePane').style.zIndex = 260;
map.getPane('demPane').style.mixBlendMode = 'screen';
map.getPane('hillshadePane').style.mixBlendMode = 'screen';

const demHighlightLayer = L.geoJSON(null, {
  style: {
    fillColor: '#c8c8d2',
    fillOpacity: 0.07,
    color: '#c8c8d2',
    weight: 1,
    opacity: 0.2,
  },
  interactive: false,
});
fetch('DEM_extent_highlight.geojson')
  .then(r => r.json())
  .then(data => demHighlightLayer.addData(data));

const demGrayLayer = L.imageOverlay('dem_gray.png', baseBounds, {
  opacity: 0.4,
  interactive: false,
  pane: 'demPane',
});

const hillshadeLayer = L.imageOverlay('hillshade.png', baseBounds, {
  opacity: 0.6,
  interactive: false,
  pane: 'hillshadePane',
});

// ---------------------------------------------------------------------------
// Coverage raster tiles
// ---------------------------------------------------------------------------
const coverageLayer = L.tileLayer('tiles/coverage/{z}/{x}/{y}.png', {
  minZoom: 9,
  maxZoom: 19,
  maxNativeZoom: 14,
  opacity: 0.75,
  attribution: 'Coverage: MeshCore Viewshed Plugin',
}).addTo(map);

// ---------------------------------------------------------------------------
// Directional raster tiles
// ---------------------------------------------------------------------------
const directionLayer = L.tileLayer('tiles/direction/{z}/{x}/{y}.png', {
  minZoom: 9,
  maxZoom: 19,
  maxNativeZoom: 14,
  opacity: 0.6,
});

// ---------------------------------------------------------------------------
// SNR heatmap image overlay
// ---------------------------------------------------------------------------
const snrBounds = [[44.9201, -123.9176], [46.0257, -121.5957]];
const snrLayer = L.imageOverlay('snr_heatmap.png', snrBounds, {
  opacity: 0.65,
  interactive: false,
});

// ---------------------------------------------------------------------------
// Node classification helpers
// ---------------------------------------------------------------------------
const CLASS_COLORS = {
  'Critical':  '#D7191C',
  'Backbone':  '#2C7BB6',
  'Redundant': '#1A9641',
  'Marginal':  '#888888',
  'No TIF':    '#CCCCCC',
};

function classifyNode(p) {
  if (!p.coverage_km2 || p.coverage_km2 === 0) return 'No TIF';
  const highCoverage = p.coverage_km2 >= 100;
  const wellConnected = p.peer_count >= 3;
  if (highCoverage && !wellConnected) return 'Critical';
  if (highCoverage &&  wellConnected) return 'Backbone';
  if (!highCoverage && wellConnected) return 'Redundant';
  return 'Marginal';
}

function nodeMarker(p) {
  const cls = classifyNode(p);
  const color = CLASS_COLORS[cls];
  return L.circleMarker([0, 0], {
    radius: cls === 'No TIF' ? 4 : 6,
    fillColor: color,
    fillOpacity: cls === 'No TIF' ? 0.5 : 0.85,
    color: '#ffffff',
    weight: 1.2,
  });
}

function popupHTML(p) {
  const cls = classifyNode(p);
  const color = CLASS_COLORS[cls];
  const coverage = p.coverage_km2 > 0 ? p.coverage_km2.toFixed(1) + ' km²' : 'None';
  const dir = p.dominant_dir || '—';
  return `
    <div class="popup-name">${p.name || 'Unnamed'}</div>
    <span class="popup-class" style="background:${color}">${cls}</span>
    <div class="popup-row"><span class="popup-label">Type</span><span class="popup-value">${p.type || '—'}</span></div>
    <div class="popup-row"><span class="popup-label">Coverage</span><span class="popup-value">${coverage}</span></div>
    <div class="popup-row"><span class="popup-label">Peers (LOS)</span><span class="popup-value">${p.peer_count ?? '—'}</span></div>
    <div class="popup-row"><span class="popup-label">Dominant direction</span><span class="popup-value">${dir}</span></div>
  `;
}

// ---------------------------------------------------------------------------
// Load nodes GeoJSON
// ---------------------------------------------------------------------------
fetch('nodes.geojson')
  .then(r => r.json())
  .then(data => {
    const nodesLayer = L.geoJSON(data, {
      pointToLayer: (feature, latlng) => {
        const m = nodeMarker(feature.properties);
        m.setLatLng(latlng);
        return m;
      },
      onEachFeature: (feature, layer) => {
        layer.bindPopup(popupHTML(feature.properties), { maxWidth: 260 });
      },
    }).addTo(map);

    L.control.layers(
      {},
      {
        'DEM extent highlight':     demHighlightLayer,
        'DEM grayscale':            demGrayLayer,
        'Hillshade':                hillshadeLayer,
        'Coverage (nodes visible)': coverageLayer,
        'Dominant direction':       directionLayer,
        'Signal Quality (SNR)':     snrLayer,
        'Repeater nodes':           nodesLayer,
      },
      { collapsed: true, position: 'topright' }
    ).addTo(map);

    // Label layer always on top — not in layer control
    L.tileLayer('https://basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}.png', {
      maxZoom: 19,
      pane: 'shadowPane',   // renders above overlays, below markers
    }).addTo(map);
  });

// ---------------------------------------------------------------------------
// Legend
// ---------------------------------------------------------------------------
const legend = L.control({ position: 'bottomleft' });
legend.onAdd = () => {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <div class="legend-header">
      <h4 style="margin:0">Legend</h4>
      <button class="legend-toggle" onclick="
        var b = this.closest('.legend').querySelector('.legend-body');
        var hidden = b.style.display === 'none';
        b.style.display = hidden ? '' : 'none';
        this.textContent = hidden ? '⋮' : '×';
      " type="button">⋮</button>
    </div>
    <div class="legend-body">
      <h4>Coverage (nodes visible)</h4>
      <div class="legend-row"><div class="legend-swatch" style="background:#FFF7BC"></div><span>1–3</span></div>
      <div class="legend-row"><div class="legend-swatch" style="background:#FEC44F"></div><span>3–6</span></div>
      <div class="legend-row"><div class="legend-swatch" style="background:#D95F0E"></div><span>6–16</span></div>
      <div class="legend-row"><div class="legend-swatch" style="background:#993304"></div><span>16+</span></div>
      <hr class="legend-divider">
      <h4>Signal Quality (SNR)</h4>
      <div class="legend-row"><div class="legend-swatch gradient"></div></div>
      <div class="legend-row" style="justify-content:space-between;width:74px"><span>Weak</span><span>Strong</span></div>
      <hr class="legend-divider">
      <h4>Node class</h4>
      <div class="legend-row"><div class="legend-swatch circle" style="background:#D7191C"></div><span>Critical</span></div>
      <div class="legend-row"><div class="legend-swatch circle" style="background:#2C7BB6"></div><span>Backbone</span></div>
      <div class="legend-row"><div class="legend-swatch circle" style="background:#1A9641"></div><span>Redundant</span></div>
      <div class="legend-row"><div class="legend-swatch circle" style="background:#888888"></div><span>Marginal</span></div>
      <div class="legend-row"><div class="legend-swatch circle" style="background:#CCCCCC"></div><span>No TIF</span></div>
      <hr class="legend-divider">
      <h4>Dominant direction</h4>
      <div class="legend-row"><div class="legend-swatch" style="background:#1E64C8"></div><span>N</span></div>
      <div class="legend-row"><div class="legend-swatch" style="background:#00B4B4"></div><span>NE</span></div>
      <div class="legend-row"><div class="legend-swatch" style="background:#32B432"></div><span>E</span></div>
      <div class="legend-row"><div class="legend-swatch" style="background:#B4DC00"></div><span>SE</span></div>
      <div class="legend-row"><div class="legend-swatch" style="background:#DC8200"></div><span>S</span></div>
      <div class="legend-row"><div class="legend-swatch" style="background:#DC3200"></div><span>SW</span></div>
      <div class="legend-row"><div class="legend-swatch" style="background:#A000C8"></div><span>W</span></div>
      <div class="legend-row"><div class="legend-swatch" style="background:#501EB4"></div><span>NW</span></div>
    </div>
  `;
  return div;
};
legend.addTo(map);
</script>
</body>
</html>
